
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Marketplace</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color: #f5f5f5;
        }

        /* Header */
        .header {
            height: 110px;
            border-bottom: 1px solid #000;
            padding: 15px 30px;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -30px;
        }

        header a {
            text-decoration: none;
            color: black;
        }

        .right-icons {
            display: flex;
            gap: 20px;
        }

        .marketplace-btn {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 15px;
            padding: 8px 30px;
            border: 1px solid #000;
            background: white;
            font-size: 20px;
        }

        .search-container {
            display: flex;
            justify-content: center;
            margin-top: 80px;
            margin-bottom: 40px;
        }

        .search-container input {
            width: 450px;
            height: 40px;
            border: 1px solid #000;
            padding-left: 12px;
            font-size: 16px;
        }


        /* Main Section */
        .main-content {
            padding: 50px 0;
        }

        .page-title {
            text-align: center;
            font-size: 32px;
            margin-bottom: 40px;
            margin-bottom: 40px;
            font-weight: normal;
        }
        
        .notification, .profile-menu-btn {
            transform: translateY(-12px);
        }


        /* User Profile Dropdown Menu */
        .user-img {
            width: 32px;
            height: 32px;
            display: block;
        }

        .profile-menu-btn {
            position: relative; 
        }

        .user-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            right: 0;
        
            min-width: 150px;
            border: 1px solid black;
            background-color: white;
            z-index: 1;
        }

        .user-dropdown a {
            display: block;
            padding: 10px;
            text-decoration: none;
            color: black;
            border-bottom: 1px solid black;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .user-dropdown a:last-child {
            border-bottom: none;
        }

        .user-dropdown a:hover {
            background-color: black;
            color: white;
        }

        .profile-menu-btn:hover .user-dropdown {
            display: block;
        }


        /* Notification Bell */
        .notification {
            position: relative;
            display: inline-block;
            cursor: pointer;
        }

        .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 16px;
            height: 16px;
             
            background: red;
            color:  white;
            border-radius: 50%;
            
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 8px;
            font-weight: bold;
        }

        .bell-img {
            width: 32px;
            height: 32px;
            display: block;
        }


    /* Full Menu Dropdown */
        .full-menu-container {
            position: relative;
            display: inline-block;
            transform: translateY(-12px)
        }

        .full-menu-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid black;
        }

        .close-btn {
            width: 100%;
            padding: 10px;
            border: none;
            background-color: white;
            cursor: pointer;
            font-size: 16px;
            text-align: right;
        }

        .full-menu-dropdown {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 320px;
            height: 100vh;
            border-right: 1px solid black;
            background-color: white;
            z-index: 99999;
        }

        .full-menu-dropdown a {
            display: block;
            padding: 12px;
            text-decoration: none;
            color: black;
            border-bottom: 1px solid black;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .full-menu-btn {
            width: 60px;
            height: 50px;
            border: 1px solid black;
            background: white;
            cursor: pointer;
            font-size: 24px;
        }

        .full-menu-dropdown a:hover {
            background-color: black;
            color: white;
        }
        
        .full-menu-dropdown.show {
            display: block;
        }

    </style>
</head>

<script>
function toggleMenu() {   
    document.getElementById("full-menu-Dropdown")
    .classList.toggle("show");
}
function closeMenu() {
    document.getElementById("full-menu-Dropdown")
    .classList.remove("show");
}
</script>

<body>
    <header class="header">

        <div class="top-bar">


            <div class="full-menu-container">
                <button class="full-menu-btn" onclick="toggleMenu()">☰</button>
                <div id="full-menu-Dropdown" class="full-menu-dropdown">

                    <div class="full-menu-header">
                        <span><strong>Menu</strong></span>
                        <button class="close-btn" onclick="closeMenu()">✕</button>
                    </div>

                    <a href="home.html">Home</a>
                    <a href="browse_listings.html">Browse Listings</a>
                    <a href="my_listings.html">My Listings</a>
                    <a href="favorites.html">Favorites</a>
                    <a href="messages.html">Messages</a>
                    <a href="create_listing.html">Create Listing</a>
                    <a href="account.html"> Account / Profile</a>
                    <a href="settings.html">Settings</a>
                    <a href="help_support.html">Help & Support</a>
                </div>
            </div>


            <a href="listing.html" class="marketplace-btn"> Campus Marketplace </a>

            <div class="search-container">
            <input type="text" placeholder="Search...">
            </div>
           
            <div class="right-icons">
                 <!-- Notification Bell -->
                <div class="notification">
                        <img src="../pictures/bell.png" alt="Bell" class="bell-img">
                    
                    <span class="badge"> </span>
                 </div>
                 
                 <!-- Profile Dropdown Menu -->
                 <div class="profile-menu-btn">
                    <img src="../pictures/user.png" alt="User" class="user-img">

                    <div class="user-dropdown">
                        <a href="account.html">Account</a>
                        <a href="messages.html">Messages</a>
                        <a href="logout.html">Logout</a>
                    </div>
                 </div>
            </div>


        </div>

    </header>

    <main class="main-content">

        <h1 class="page-title">Create Listing</h1>

        <div class="form-container">


    </main>

</body>
</html>
