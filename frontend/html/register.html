<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Create Account | Campus Marketplace</title>

  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
  <main class="register-page">
    <section class="register-container">
      <header class="register-header">
        <h1>Create Account</h1>
        <p>@student.kpu.ca email required</p>
      </header>

      <form id="registerForm" class="register-form" nonvalidate>
        <div class="form-group">
          <label for="fullName">Full Name</label>

          <input
            type="text"
            id="fullName"
            name="fullName"
            placeholder="Name"
            autocomplete="name"
            
          >
          <p id="fullNameError" class="field-error"></p>
        </div>

        <div class="form-group">
          <label for="email">KPU Email</label>

          <input
            type="email"
            id="email"
            name="email"
            placeholder="addrress@student.kpu.ca"
            autocomplete="email"
          >
          <p id="emailError" class="field-error"></p>
        </div>

        <div class="form-group">
          <label for="password">Password</label>

          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••"
            autocomplete="new-password"
            minlength="8"
          >
          <p id="passwordError" class="field-error"></p>
        </div>

        <label id="termsRow" class="terms-row">
          <input
            type="checkbox"
            id="terms"
            name="terms"
          >
            
          <span>I agree to terms of service</span>
          <p id="termsError" class="field-error"></p>
        </label>

        <p id="registerMessage" class="form-message"></p>

        <button type="submit" class="register-button">
          Sign Up
        </button>

        <p class="login-link">
          Already registered?
          <a href="login.html">Login</a>
        </p>
      </form>
    </section>
  </main>

  <script src="../js/register.js"></script>
</body>
</html>
