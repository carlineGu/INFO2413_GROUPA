<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Marketplace - Create Listing</title>

    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/create_listing.css">

</head>

<body>
    <div id="navbar"></div>
    <div id="menu-overlay" class="menu-overlay"></div>

    <div id="create_listing"></div>
    
<main class="main-content">

<h1 class="page-title">Leave a Review</h1>
 <div class="form-container">


    <div class="form-group">
      <label class="photo-label">
        Photos <span>(up to 4)</span>
      </label>

      <div class="photo-grid">

        <label class="photo-upload">
            <span class="plus">+</span>
            <span>Add</span>
            <input type="file" accept="image/*">
        </label>

        <label class="photo-upload">
            <span class="plus">+</span>
            <span>Add</span>
            <input type="file" accept="image/*">
        </label>

        <label class="photo-upload">
            <span class="plus">+</span>
            <span>Add</span>
            <input type="file" accept="image/*">
        </label>

        <label class="photo-upload">
            <span class="plus">+</span>
            <span>Add</span>
            <input type="file" accept="image/*">
        </label>
      </div>  
    </div>  

    <div class="form-group">
        <label>Title</label>
        <input
            id="title"
            type="text"
            placeholder="e.g. Used Calculus Textbook">
    </div>

    <div class="form-group">
        <label>Price</label>
        <input
            id="price"
            type="text" 
            placeholder="$0.00"
        >
    </div>

    <div class="form-group">
        <label>Department</label>
        <select id="department">
            <option value="">Select...</option>
            <option value="1">Computer Science</option>
            <option value="2">Business</option>
            <option value="3">Engineering</option>
        </select>
    </div>

    <div class="form-group">
        <label>Category</label>
        <select id="category" onchange="updateSubcategories()">
            <option value="">Select...</option>
            <option value="Books">Books & Textbooks</option>
            <option value="Electronics">Electronics</option>
            <option value="Furniture">Dorm & Furniture</option>
            <option value="Clothing">Clothing & Accessories</option>
        </select>
    </div>

    <div class="form-group">
        <label>Subcategory</label>
        <select id="subcategory">
            <option>Select...</option>
        </select>
    </div>

    <div class="form-group">
        <label>Condition<span>(optional)</span></label>
        <select id="condition">
            <option>Select...</option>
            <option>New</option>
            <option>Like New</option>
            <option>Good</option>
            <option>Fair</option>
            <option>Used</option>
        </select>
    </div>

    <div class="form-group">
        <label>Meetup Location <span>(optional)</span></label>
        <select id="location">
            <option>Select...</option>
            <option>Richmond Campus</option>
            <option>Surrey Campus</option>
            <option>Langley Campus</option>
        </select>
    </div>

    <div class="form-group">
        <label>Description</label>
        <textarea 
            id="description"
            placeholder="Condition, details, and any other notes about the item..."></textarea>
    </div>

    <button class="publish-btn" onclick="publishListing()">
        Publish Listing
    </button>

   </div>
      
       

</main>
  <script src="../js/create_listing.js"></script>
  <script src="../js/navbar.js"></script>

</body> 
</html>
