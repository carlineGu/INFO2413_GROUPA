<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Marketplace - Create Listing</title>

    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/listing.css">

</head>

<body>
    <div id="navbar"></div>
    <div id="menu-overlay" class="menu-overlay"></div>
    <div id="listing"></div>
    
<main class="main-content"> 

    <a href="index.html" class="back-link">
        ← Back to Listings
    </a>

    <div class="listing-image">
        <img id="listing-photo">
    </div>

    <div class="listing-details">
        <div class="listing-header">
            <h1 id="listing-title"></h1>
            <span id="listing-price"></span>
            <button
                class="favorite-btn"
                onclick="toggleFavorite()"> 
                <img id="heart-img" class="heart-img" src="../pictures/heart-outline.png">
            </button>
        </div>

    <div id="listing-meta" class="listing-meta"></div>
    
    <p id="listing-description"></p>
    </div>
   

<div class="seller-card">
    <div class="seller-left">
        <div class="seller-avatar">
            <img id="seller-avatar" alt="Seller Photo">
        </div>
    <div>
        <h3 id="seller-name"></h3>
        <p id="seller-department"></p>
    </div>
</div>
</div>

<button class="publish-btn" onclick="contactSeller()">
    Contact Seller 
</button>

</main>
  <script src="../js/listing.js"></script>
  <script src="../js/navbar.js"></script>

</body> 
</html>
