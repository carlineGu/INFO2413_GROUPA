<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Campus Marketplace</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <main class="register-page">
    <section class="register-container">
      <header class="register-header">
        <h1>Login</h1>
        <p>Sign in to your Campus Marketplace account</p>
      </header>

      <form id="loginForm" class="register-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="name@student.kpu.ca"
            autocomplete="email"
            required
          />
          <p id="emailError" class="field-error"></p>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••"
            autocomplete="current-password"
            required
          />
          <p id="passwordError" class="field-error"></p>
        </div>

        <p id="loginMessage" class="form-message"></p>

        <button type="submit" class="register-button">Log In</button>

        <p class="login-link">
          Need an account?
          <a href="register.html">Create one</a>
        </p>
      </form>
    </section>
  </main>

  <script src="../js/login.js"></script>
</body>
</html>
