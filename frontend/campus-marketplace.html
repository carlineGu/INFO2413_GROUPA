// ─── Dropdown primitive ───────────────────────────────────────────────────────

function Dropdown({ label, options, onSelect }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    function handle(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener("mousedown", handle);
    return () => document.removeEventListener("mousedown", handle);
  }, []);

  return (
    <div ref={ref} className="relative">
      <button
        onClick={() => setOpen((o) => !o)}
        className="flex items-center gap-1 border border-black px-2 py-1 text-xs bg-white whitespace-nowrap"
      >
        {label} <span className="text-[10px]">▾</span>
      </button>
      {open && options.length > 0 && (
        <div className="absolute top-full left-0 mt-px border border-black bg-white z-50 min-w-[160px]">
          {options.map((o) => (
            <button
              key={o}
              onClick={() => { onSelect?.(o); setOpen(false); }}
              className="block w-full text-left px-3 py-1.5 text-xs hover:bg-black hover:text-white border-b border-black last:border-0"
            >
              {o}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Support Inbox ────────────────────────────────────────────────────────────

function SupportInbox({ messages, onMarkRead, compact = false }) {
  const [openId, setOpenId] = useState(null);
  const [replies, setReplies] = useState({});
  const [drafts, setDrafts] = useState({});

  function sendReply(id) {
    const text = (drafts[id] || "").trim();
    if (!text) return;
    setReplies(r => ({ ...r, [id]: [...(r[id] || []), { from: "admin", text, time: new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) }] }));
    setDrafts(d => ({ ...d, [id]: "" }));
    onMarkRead(id);
  }

  if (messages.length === 0) return <div className="p-10 text-center text-xs text-gray-400">No support messages yet</div>;

  return (
    <div className="flex flex-col gap-3">
      {messages.map((m) => {
        const isOpen = openId === m.id;
        const thread = replies[m.id] || [];
        return (
          <div key={m.id} className={`border border-gray-200 rounded-lg overflow-hidden shadow-sm ${!m.read ? "border-l-4 border-l-black" : ""}`}>
            {/* Header row — always visible */}
            <button
              onClick={() => { setOpenId(isOpen ? null : m.id); if (!m.read) onMarkRead(m.id); }}
              className="w-full flex items-center gap-3 px-4 py-3 text-left hover:bg-gray-50"
            >
              <div className="w-8 h-8 shrink-0 bg-gray-100 rounded-full border border-gray-200 flex items-center justify-center text-sm font-semibold">{m.name[0]}</div>
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-2">
                  <span className="text-sm font-semibold truncate">{m.subject}</span>
                  {!m.read && <span className="text-[9px] bg-black text-white px-1.5 py-0.5 rounded shrink-0">New</span>}
                  {thread.length > 0 && <span className="text-[9px] border border-gray-300 px-1.5 py-0.5 rounded text-gray-500 shrink-0">{thread.length} repl{thread.length === 1 ? "y" : "ies"}</span>}
                </div>
                <div className="text-xs text-gray-400">{m.name} · {m.email} · {m.date}</div>
              </div>
              <span className="text-xs text-gray-400 shrink-0">{isOpen ? "▴" : "▾"}</span>
            </button>

            {/* Expanded thread */}
            {isOpen && (
              <div className="border-t border-gray-100">
                {/* Original message */}
                <div className="px-4 py-3 bg-gray-50 border-b border-gray-100">
                  <div className="text-xs text-gray-500 mb-1 font-medium">From: {m.name} &lt;{m.email}&gt;</div>
                  <div className="text-sm text-gray-800 whitespace-pre-wrap">{m.body}</div>
                </div>

                {/* Reply thread */}
                {thread.map((r, i) => (
                  <div key={i} className="px-4 py-3 bg-blue-50/30 border-b border-gray-100">
                    <div className="text-xs text-gray-500 mb-1 font-medium">Admin · {r.time}</div>
                    <div className="text-sm text-gray-800 whitespace-pre-wrap">{r.text}</div>
                  </div>
                ))}

                {/* Reply compose */}
                <div className="px-4 py-3">
                  <div className="text-xs text-gray-500 mb-1.5 font-medium">Reply to {m.name}</div>
                  <textarea
                    value={drafts[m.id] || ""}
                    onChange={e => setDrafts(d => ({ ...d, [m.id]: e.target.value }))}
                    placeholder={"Type your reply to " + m.email + "..."}
                    rows={compact ? 2 : 3}
                    className="w-full border border-gray-200 rounded px-3 py-2 text-xs outline-none focus:border-black resize-none"
                  />
                  <div className="flex gap-2 mt-2">
                    <button
                      onClick={() => sendReply(m.id)}
                      disabled={!(drafts[m.id] || "").trim()}
                      className="px-4 py-1.5 text-xs bg-black text-white rounded disabled:opacity-40"
                    >
                      Send Reply
                    </button>
                    <button onClick={() => setDrafts(d => ({ ...d, [m.id]: "" }))} className="px-4 py-1.5 text-xs border border-gray-300 rounded hover:border-black">

                    </button>
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

const MOCK_CHATS = [
  { id: 1, seller: "Alice Kim", item: "Used Calculus Textbook", price: "$20", lastMsg: "Is this still available?", time: "2h ago", unread: 1 },
  { id: 2, seller: "Ben Torres", item: "Laptop – MacBook Pro", price: "$850", lastMsg: "Can you do $800?", time: "Yesterday", unread: 0 },

  { id: 4, seller: "Eva Singh", item: "Graphing Calculator", price: "$60", lastMsg: "Sounds good!", time: "Sun", unread: 0 },
];

function ChatView({ chat, onBack }) {
  const [msgs, setMsgs] = useState([
    { from: "them", text: chat ? chat.lastMsg : "Hi, is this still available?" },
    { from: "me", text: "Yes it is!" },
  ]);
  const [input, setInput] = useState("");
  function send() {
    if (!input.trim()) return;
    setMsgs(m => [...m, { from: "me", text: input.trim() }]);
    setInput("");
  }
  return (
    <div className="border border-black bg-white">
      <div className="border-b border-black p-3 flex items-center gap-3">
        <button onClick={onBack} className="text-xs underline mr-2">←</button>
        <div className="w-8 h-8 shrink-0"><ImgBox /></div>
        <div>
          <div className="text-sm font-medium">{chat ? chat.seller : "Seller name"}</div>
          <div className="text-xs text-gray-500">{chat ? chat.item + " · " + chat.price : "Item name"}</div>
        </div>
      </div>
      <div className="p-4 flex flex-col gap-3 min-h-[280px] max-h-[400px] overflow-y-auto">
        {msgs.map((m, i) => (
          <div key={i} className={`max-w-[70%] border border-black px-3 py-2 text-xs ${m.from === "me" ? "self-end bg-black text-white" : "self-start bg-gray-100"}`}>
            {m.text}
          </div>
        ))}
      </div>
      <div className="border-t border-black p-2 flex gap-2">
        <input
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="Type a message..."
          className="flex-1 border border-black px-2 py-1 text-xs outline-none"
        />
        <button onClick={send} className="border border-black px-3 py-1 text-xs">Send</button>
      </div>
    </div>
  );
}

                  rows={5}
                  className="w-full border border-black px-3 py-2 text-xs outline-none resize-none"
                />
              </div>
              <button
                onClick={handleSend}
                disabled={!name || !email || !subject || !body}
                className="w-full py-2 text-sm border border-black bg-black text-white disabled:opacity-40"
              >
                Send Message
              </button>
            </div>
          )}
        </div>
      </div>
    </>
  );
}

// ─── App ──────────────────────────────────────────────────────────────────────

function App() {
  const [page, setPage] = useState("intro");
  const [loggedIn, setLoggedIn] = useState(false);
  const [saved, setSaved] = useState(Array(LISTINGS.length).fill(false));
  const [supportMessages, setSupportMessages] = useState([]);

  const navigate = (p) => {
    if (p === "main" && !loggedIn) { setPage("intro"); return; }
    if (p === "login" && loggedIn) { setLoggedIn(false); setPage("intro"); return; }
    setPage(p);
  };

  const toggleSaved = (i, e) => {
    e.stopPropagation();
    setSaved((prev) => prev.map((v, idx) => (idx === i ? !v : v)));
  };

  const savedItems = LISTINGS.filter((_, i) => saved[i]);

  const addSupportMessage = (msg) => {
    setSupportMessages((prev) => [
      ...prev,
      { ...msg, id: Date.now(), date: new Date().toLocaleDateString(), read: false },
    ]);
  };

  const markSupportRead = (id) => {
    setSupportMessages((prev) => prev.map((m) => (m.id === id ? { ...m, read: true } : m)));
  };

  const handleLogin = () => { setLoggedIn(true); setPage("main"); };

  return (
    <div className="min-h-screen bg-white font-sans text-black">
      {page === "intro"   && <Intro   onNavigate={navigate} />}
      {page === "main"    && <Main    onNavigate={navigate} saved={saved} onToggleSaved={toggleSaved} />}
      {page === "login"   && <Login   onNavigate={navigate} onLogin={handleLogin} />}
      {page === "signup"  && <Signup  onNavigate={navigate} onLogin={handleLogin} />}
      {page === "profile"   && <Profile onNavigate={navigate} initialTab="listings" savedItems={savedItems} />}
      {page === "favorites" && <Profile onNavigate={navigate} initialTab="saved" savedItems={savedItems} />}
      {page === "settings"  && <Profile onNavigate={navigate} initialTab="settings" savedItems={savedItems} />}
      {page === "forgotPassword" && <ForgotPassword onNavigate={navigate} />}
      {page === "listing" && <Listing onNavigate={navigate} />}
      {page === "createListing" && <CreateListing onNavigate={navigate} />}
      {page === "messages"      && <Messages onNavigate={navigate} fromListing={false} />}
      {page === "messagesFromListing" && <Messages onNavigate={navigate} fromListing={true} />}
      {page === "sellerProfile"  && <Profile onNavigate={navigate} initialTab="listings" savedItems={[]} sellerView={true} />}
      {page === "adminLogin" && <AdminLogin onNavigate={navigate} onLogin={() => { setLoggedIn(true); setPage("admin"); }} />}
      {page === "admin"           && <Admin onNavigate={navigate} supportMessages={supportMessages} onMarkRead={markSupportRead} />}
      {page === "adminModeration" && <Admin onNavigate={navigate} supportMessages={supportMessages} onMarkRead={markSupportRead} initialSection="moderation" />}
      {page === "adminActivity"   && <Admin onNavigate={navigate} supportMessages={supportMessages} onMarkRead={markSupportRead} initialSection="activity" />}
      {page === "helpSupport" && <HelpSupport onNavigate={navigate} onSubmit={addSupportMessage} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
